[tool.poetry]
name = "dctwin"
version = "0.3.0"
description = "CFD digital twin for data centers."
authors = ["Neng <xiad0001@ntu.edu.sg>"]
packages = [
    {include = "dctwin"},
]

[tool.poetry.dependencies]
python = ">=3.8,<3.11"
click = "8.1.3"
pydantic = "1.10.2"
Jinja2 = "3.1.2"
docker = "6.0.0"
isort = "5.10.1"
MarkupSafe = "2.0.1"
setuptools = "59.8.0"

[tool.poetry.dev-dependencies]
pytest = "^6.2.1"
isort = "^5.7.0"
black = "^20.8b1"
pylava = "^0.3.0"

[tool.poetry.scripts]
dctwin = 'dctwin.cli.main:cli'

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
