[tool.poetry]
name = "dctwin"
version = "0.1.0"
description = "CFD digital twin for data centers."
authors = ["Neng <darren.xia@ntu.edu.sg>"]
packages = [
    {include = "dctwin"},
]

[tool.poetry.dependencies]
python = "^3.7.1"
click = "^7.1.2"
pydantic = "^1.7.3"
PyYAML = "^5.3.1"
Jinja2 = "^2.11.2"
docker = "^5.0.0"

[tool.poetry.dev-dependencies]
pytest = "^6.2.1"
isort = "^5.7.0"
black = "^20.8b1"
pylava = "^0.3.0"
pandas = "^1.2.0"

[tool.poetry.scripts]
dctwin = 'dctwin.cli.main:cli'

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
