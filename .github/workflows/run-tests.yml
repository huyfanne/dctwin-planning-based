name: Run tests

on:
  pull_request:
    branches: ["main","dev"]

jobs:
  run-cfd:
    runs-on:
      labels: large_4c
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker images
        run: |
          docker pull ghcr.io/cap-dcwiz/salome-9-debian10:latest
          docker pull ghcr.io/cap-dcwiz/openfoam-2312-cuda-smi75:1.0.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install dependencies with Poetry
        env:
          MY_SECRET_VALUE: ${{ secrets.GIT_TOKEN }}
        run: |
          git config --global http.https://github.com/.extraheader "Authorization: Basic $(echo -n $MY_SECRET_VALUE | base64)"
          poetry env use 3.11
          poetry run pip install "setuptools>=65" wheel vtk==9.5.1
          poetry run pip install mayavi==4.8.3 --no-build-isolation
          poetry install

      - name: Run python script
        run: cd test && poetry run python test_cfd.py

  run-cosim:
    runs-on:
      labels: large_4c
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker images
        run: |
          docker pull ghcr.io/cap-dcwiz/salome-9-debian10:latest
          docker pull ghcr.io/cap-dcwiz/openfoam-2312-cuda-smi75:1.0.0
          docker pull ghcr.io/cap-dcwiz/energyplus-9-5-0:latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install dependencies with Poetry
        env:
          MY_SECRET_VALUE: ${{ secrets.GIT_TOKEN }}
        run: |
          git config --global http.https://github.com/.extraheader "Authorization: Basic $(echo -n $MY_SECRET_VALUE | base64)"
          poetry env use 3.11
          poetry run pip install "setuptools>=65" wheel vtk==9.5.1
          poetry run pip install mayavi==4.8.3 --no-build-isolation
          poetry install

      - name: Run python script
        run: cd test && poetry run python test_eplus_cfd_cosim.py

  run-eplus:
    runs-on:
      labels: large_4c
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install dependencies with Poetry
        env:
          MY_SECRET_VALUE: ${{ secrets.GIT_TOKEN }}
        run: |
          git config --global http.https://github.com/.extraheader "Authorization: Basic $(echo -n $MY_SECRET_VALUE | base64)"
          poetry env use 3.11
          poetry run pip install "setuptools>=65" wheel vtk==9.5.1
          poetry run pip install mayavi==4.8.3 --no-build-isolation
          poetry install --no-interaction

      - name: Pull Docker images
        run: |
          docker pull ghcr.io/cap-dcwiz/energyplus-9-5-0:latest

      - name: Run python script
        run: cd test && poetry run python test_eplus.py
