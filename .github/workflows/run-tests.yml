name: Run tests

on:
  pull_request:
    branches: ["main","dev"]

jobs:
  run-cfd:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker images
        run: |
          docker pull ghcr.io/cap-dcwiz/openfoam-v1912-centos72:latest
          docker pull ghcr.io/cap-dcwiz/salome-9-debian10:latest

      - name: Install dependencies with Poetry
        env:
          MY_SECRET_VALUE: ${{ secrets.GIT_TOKEN }}
        run: |
          git config --global http.https://github.com/.extraheader "Authorization: Basic $(echo -n $MY_SECRET_VALUE | base64)"
          poetry install

      - name: Run python script
        run: cd test && poetry run python test_cfd.py

  run-cosim:
