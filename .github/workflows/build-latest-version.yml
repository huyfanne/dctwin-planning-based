name: build-latest-version
on:
  push:
    tags:
      - 'v*'

jobs:
  Build-Docker-Images-Release:
    runs-on:
      labels: large_4c
    steps:
      - name: Set Swap Space
        uses: actionhippie/swap-space@v1
        with:
          size: 40G
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Extract long version from pyproject.toml
        run: echo "IMAGE_VERSION_LONG=$(grep '^version' pyproject.toml | awk -F' = |\"' '{print $3}')" >> $GITHUB_ENV

      - name: Extract short version from pyproject.toml
        run: echo "IMAGE_VERSION_SHORT=$(echo ${{ env.IMAGE_VERSION_LONG }} | awk -F'.' '{print $1, $2}' OFS='.')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          # secrets: |
          #   GITHUB_TOKEN=${{ secrets.GIT_TOKEN }}
          tags: |
            ghcr.io/cap-dcwiz/dctwin:${{ env.IMAGE_VERSION_LONG }}
            ghcr.io/cap-dcwiz/dctwin:${{ env.IMAGE_VERSION_SHORT }}
            ghcr.io/cap-dcwiz/dctwin:latest

      - name: Log in to the Azure Container registry
        uses: docker/login-action@v2
        with:
          registry: dcwiz.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_TOKEN }}

      - name: Build and push Azure registry image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          secrets: |
            GITHUB_TOKEN=${{ secrets.AZURE_TOKEN }}
          tags: |
            dcwiz.azurecr.io/cap-dcwiz/dctwin:${{ env.IMAGE_VERSION_LONG }}
            dcwiz.azurecr.io/cap-dcwiz/dctwin:${{ env.IMAGE_VERSION_SHORT }}
            dcwiz.azurecr.io/cap-dcwiz/dctwin:latest
