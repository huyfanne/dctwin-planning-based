name: Run huskyci

on:
  pull_request:
    branches: ["main","dev"]
  workflow_dispatch:
  push:

jobs:
  run-huskyci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out HuskyCI code
        uses: actions/checkout@v4
        with:
          repository: globocom/huskyCI
          token: ${{ secrets.GITHUB_TOKEN }}
      
      
      # - name: Authenticate to Docker
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USER }}
      #     password: ${{ secrets.DOCKER_PAT }}
      - name: Set up code
        run: |
          docker pull --platform linux/amd64 mongo:4.2.2    
          docker pull --platform linux/amd64  docker:24-rc-dind 
          docker context inspect $(docker context show) | awk -F '"' '/"Host"/ {print $4}'
          sudo usermod -aG docker $(whoami)
          make install
          source .env
          make run-client-linux

