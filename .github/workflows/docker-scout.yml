name: Docker Scout on image
on:
  pull_request:
    paths:
      - Dockerfile
      - poetry.lock

jobs:
  build-and-scout:
    runs-on:
      labels: large_4c
    steps:
    - name: Set Swap Space
      uses: actionhippie/swap-space@v1
      with:
        size: 40G
    
    - name: Check out code
      uses: actions/checkout@v5

    - name: Get version
      id: version
      uses: SebRollen/toml-action@v1.2.0
      with:
        file: pyproject.toml  
        field: tool.poetry.version

    # DEBUG: use a known-good tiny image to verify Scout workflow, not the real build
    - name: Pull stub image for Scout testing
      run: docker pull alpine:3.21

    - name: Authenticate to Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PAT }}

    - name: Docker Scout
      id: docker-scout
      uses: docker/scout-action@v1
      with:
        command: cves,recommendations
        image: local://alpine:3.21  # DEBUG: stub image — swap back to real build when done
        github-token: ${{ secrets.GITHUB_TOKEN }}
        summary: true

    - name: Upload artifacts
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        path: dockerscout-output.json