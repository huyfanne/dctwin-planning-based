name: Docker Scout on image
on:
  pull_request:
    paths:
      - Dockerfile
      - poetry.lock

jobs:
  build-and-scout:
    runs-on:
      labels: large_4c
    steps:
    - name: Set Swap Space
      uses: actionhippie/swap-space@v1
      with:
        size: 40G
    
    - name: Check out code
      uses: actions/checkout@v5

    - name: Get version
      id: version
      uses: SebRollen/toml-action@v1.2.0
      with:
        file: pyproject.toml  
        field: tool.poetry.version

    - name: Build Docker image locally
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        load: true                          # loads into local Docker daemon, no push
        secrets: |
          GITHUB_TOKEN=${{ secrets.GIT_TOKEN }}
        tags: ghcr.io/cap-dcwiz/dctwin:${{ steps.version.outputs.value }}

    - name: Authenticate to Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PAT }}

    - name: Docker Scout
      id: docker-scout
      uses: docker/scout-action@v1
      with:
        command: cves                       # recommendations removed: requires pushed image for base layer resolution
        image: local://ghcr.io/cap-dcwiz/dctwin:${{ steps.version.outputs.value }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        summary: true

    - name: Upload artifacts
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        path: dockerscout-output.json